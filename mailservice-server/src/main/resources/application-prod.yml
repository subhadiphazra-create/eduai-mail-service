# ─────────────────────────────────────────────────────────────────────────────
# PROD profile — PostgreSQL + Upstash Redis (TLS) + real SMTP/Resend/SendGrid
# All secrets via environment variables — NEVER hardcode in this file
# ─────────────────────────────────────────────────────────────────────────────
spring:

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  datasource:
    url:              ${DATABASE_URL}
    username:         ${DATABASE_USERNAME}
    password:         ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size:    20
      minimum-idle:         5
      connection-timeout:   30000
      idle-timeout:         600000
      max-lifetime:         1800000
      pool-name:            MailHikariPool
      auto-commit:          false

  jpa:
    hibernate:
      ddl-auto: validate        # use Flyway / Liquibase in production
    show-sql: false
    properties:
      hibernate:
        format_sql:             false
        jdbc:
          batch_size:           50
        generate_statistics:    false

  # ── Upstash Redis (TLS) ─────────────────────────────────────────────────
  data:
    redis:
      host:     ${REDIS_HOST}
      port:     ${REDIS_PORT:6380}
      password: ${REDIS_PASSWORD}
      ssl:
        enabled: true
      timeout:  5000

  # ── SMTP (Production) ──────────────────────────────────────────────────
  mail:
    host:     ${SMTP_HOST}
    port:     ${SMTP_PORT:587}
    username: ${SMTP_USERNAME}
    password: ${SMTP_PASSWORD}
    properties:
      mail:
        smtp:
          auth:                true
          starttls:
            enable:            true
            required:          true
          connectiontimeout:   5000
          timeout:             10000
          writetimeout:        10000

# ── Logging ───────────────────────────────────────────────────────────────────
logging:
  level:
    com.eduai.mailservice:     INFO
    org.springframework:       WARN
    org.hibernate:             WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%X{correlationId}] %logger{36} - %msg%n"
  file:
    name: /var/log/eduai-mail-service/app.log

# ── Mail providers (prod — enable desired providers via env vars) ─────────────
mail:
  providers:
    smtp:
      enabled:    ${SMTP_ENABLED:true}
      from-email: ${SMTP_FROM_EMAIL}
      from-name:  ${SMTP_FROM_NAME:EduAI}

    resend:
      enabled:    ${RESEND_ENABLED:false}
      api-key:    ${RESEND_API_KEY:}
      from-email: ${RESEND_FROM_EMAIL:}
      from-name:  ${RESEND_FROM_NAME:EduAI}

    sendgrid:
      enabled:    ${SENDGRID_ENABLED:false}
      api-key:    ${SENDGRID_API_KEY:}
      from-email: ${SENDGRID_FROM_EMAIL:}
      from-name:  ${SENDGRID_FROM_NAME:EduAI}

  async:
    core-pool-size:  ${MAIL_ASYNC_CORE_POOL:10}
    max-pool-size:   ${MAIL_ASYNC_MAX_POOL:50}
    queue-capacity:  ${MAIL_ASYNC_QUEUE_CAPACITY:2000}

  scheduler:
    poll-rate-ms: ${MAIL_SCHEDULER_POLL_RATE:60000}

# ── Actuator ───────────────────────────────────────────────────────────────────
management:
  endpoint:
    health:
      show-details: when_authorized
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
