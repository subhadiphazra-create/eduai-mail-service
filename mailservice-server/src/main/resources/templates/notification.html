<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Notification</title>
  <style>
    body { margin:0; padding:0; font-family:'Segoe UI',Arial,sans-serif; background:#f4f6fb; }
    .wrapper { width:100%; background:#f4f6fb; padding:40px 0; }
    .container { max-width:520px; margin:0 auto; background:#fff; border-radius:12px;
                 box-shadow:0 2px 16px rgba(0,0,0,0.08); overflow:hidden; }
    .header { background:linear-gradient(135deg,#3b82f6,#1d4ed8); padding:32px 40px; text-align:center; }
    .header h1 { margin:0; color:#fff; font-size:22px; font-weight:700; }
    .body   { padding:36px 40px; }
    .text   { font-size:15px; color:#374151; line-height:1.8; margin:0 0 16px; }
    .info-box { background:#eff6ff; border-left:4px solid #3b82f6; border-radius:0 8px 8px 0;
                padding:16px 20px; margin:20px 0; font-size:14px; color:#1e40af; line-height:1.6; }
    .cta-wrap { text-align:center; margin:28px 0; }
    .cta-btn  { display:inline-block; background:#3b82f6; color:#fff; text-decoration:none;
                font-weight:700; font-size:14px; padding:12px 28px; border-radius:7px; }
    .footer   { padding:20px 40px; background:#f9fafb; text-align:center; }
    .footer p { font-size:12px; color:#9ca3af; margin:4px 0; }
    .footer a { color:#3b82f6; text-decoration:none; }
  </style>
</head>
<body>
<div class="wrapper">
  <div class="container">
    <div class="header">
      <h1>🔔 <span th:text="${notificationTitle ?: 'Notification'}">Notification</span></h1>
    </div>
    <div class="body">
      <p class="text">Hi <strong th:text="${toName ?: 'there'}">there</strong>,</p>
      <p class="text" th:text="${notificationMessage ?: 'You have a new notification.'}">
        You have a new notification.
      </p>
      <div th:if="${notificationDetails}" class="info-box" th:text="${notificationDetails}">
        Details here.
      </div>
      <div th:if="${actionUrl}" class="cta-wrap">
        <a th:href="${actionUrl}" class="cta-btn" th:text="${actionLabel ?: 'View Details'}">View Details</a>
      </div>
    </div>
    <div class="footer">
      <p>© <span th:text="${year ?: 2025}">2025</span> <span th:text="${appName ?: 'EduAI'}">EduAI</span></p>
      <p th:if="${supportEmail}">
        <a th:href="'mailto:' + ${supportEmail}" th:text="${supportEmail}">support@eduai.com</a>
      </p>
    </div>
  </div>
</div>
</body>
</html>
