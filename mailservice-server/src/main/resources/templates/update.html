<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Account Update</title>
  <style>
    body { margin:0; padding:0; font-family:'Segoe UI',Arial,sans-serif; background:#f4f6fb; }
    .wrapper { width:100%; background:#f4f6fb; padding:40px 0; }
    .container { max-width:520px; margin:0 auto; background:#fff; border-radius:12px;
                 box-shadow:0 2px 16px rgba(0,0,0,0.08); overflow:hidden; }
    .header { background:linear-gradient(135deg,#0ea5e9,#0284c7); padding:32px 40px; text-align:center; }
    .header h1 { margin:0; color:#fff; font-size:22px; font-weight:700; }
    .body  { padding:36px 40px; }
    .text  { font-size:15px; color:#374151; line-height:1.8; margin:0 0 16px; }
    .change-box { background:#f0f9ff; border:1px solid #bae6fd; border-radius:10px;
                  padding:20px 24px; margin:20px 0; }
    .change-box h3 { margin:0 0 10px; color:#0369a1; font-size:15px; }
    .change-row { display:flex; justify-content:space-between; font-size:13px;
                  color:#374151; padding:6px 0; border-bottom:1px solid #e0f2fe; }
    .change-row:last-child { border-bottom:none; }
    .change-label { color:#6b7280; }
    .warning { background:#fef3c7; border-left:4px solid #f59e0b; border-radius:0 6px 6px 0;
               padding:12px 16px; margin:20px 0; font-size:13px; color:#92400e; }
    .footer { padding:20px 40px; background:#f9fafb; text-align:center; }
    .footer p { font-size:12px; color:#9ca3af; margin:4px 0; }
    .footer a { color:#0ea5e9; text-decoration:none; }
  </style>
</head>
<body>
<div class="wrapper">
  <div class="container">
    <div class="header">
      <h1>🔄 <span th:text="${updateTitle ?: 'Account Update'}">Account Update</span></h1>
    </div>
    <div class="body">
      <p class="text">Hi <strong th:text="${toName ?: 'there'}">there</strong>,</p>
      <p class="text" th:text="${updateMessage ?: 'Your account information has been updated.'}">
        Your account information has been updated.
      </p>
      <div th:if="${changeDetails}" class="change-box">
        <h3>What Changed</h3>
        <div th:each="entry : ${changeDetails}" class="change-row">
          <span class="change-label" th:text="${entry.key}">Field</span>
          <span th:text="${entry.value}">Value</span>
        </div>
      </div>
      <div class="warning">
        ⚠️ If you did not make this change, please contact support immediately.
      </div>
    </div>
    <div class="footer">
      <p>© <span th:text="${year ?: 2025}">2025</span> <span th:text="${appName ?: 'EduAI'}">EduAI</span></p>
      <p th:if="${supportEmail}">
        <a th:href="'mailto:' + ${supportEmail}" th:text="${supportEmail}">support@eduai.com</a>
      </p>
    </div>
  </div>
</div>
</body>
</html>
